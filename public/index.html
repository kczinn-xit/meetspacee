<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MeetSpace</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🟣</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/main.css" />
</head>
<body>

  <div class="landing">
    <div class="landing-logo">
      <div class="logo-icon"></div>
      <h1>MeetSpace</h1>
      <p class="tagline">Simple, fast, no-frills video meetings</p>
    </div>

    <div class="landing-actions">
      <button id="new-meeting" class="btn btn-primary">
        <span class="btn-icon"></span>
        New Meeting
      </button>

      <div class="divider"><span>or join a room</span></div>

      <div class="join-form">
        <div class="form-group">
          <label for="join-name">Your name</label>
          <input type="text" id="join-name" placeholder="Enter your name" autocomplete="off" />
        </div>
        <div class="form-group">
          <label for="join-code">Room code</label>
          <div class="code-input-row">
            <input type="text" id="join-code" placeholder="Enter room code" maxlength="8" autocomplete="off" spellcheck="false" />
            <button id="join-btn" class="btn btn-secondary">Join</button>
          </div>
        </div>
      </div>

      <div id="created-room" class="created-room hidden">
        <p class="room-label">Your meeting room</p>
        <div class="room-code-display">
          <span id="room-code-text"></span>
          <button id="copy-link" class="btn-icon-ghost" title="Copy link">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="js/main.js"></script>
</body>
</html>
